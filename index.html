<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>首页</title>
  <style>
    :root { --on-background:#e5e2e1; --on-secondary-fixed:#221b00; --outline:#aa8987; --on-primary-container:#fff9f9; --background:#0a0a0a; --primary-container:#d4393c; --surface-variant:#353534; --secondary-container:#f5d36e; --primary:#d4393c; --font-stack:system-ui,"PingFang SC","Microsoft YaHei",sans-serif; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; background:var(--background); }
    body { position:relative; display:flex; flex-direction:column; max-width:430px; margin:0 auto; min-height:100vh; color:var(--on-background); overflow-x:hidden; font-family:var(--font-stack); }
    ::selection { background:var(--primary-container); color:var(--on-primary-container); }

    .页面主内容 { position:relative; z-index:10; flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1rem 1.5rem 6rem; }
    .粒子容器 { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:100%; z-index:0; pointer-events:none; }
    .粒子 { position:absolute; border-radius:9999px; }
    .粒子小 { width:4px; height:4px; }
    .粒子大 { width:6px; height:6px; }
    .主色粒子 { background:var(--primary); box-shadow:0 0 10px var(--primary); }
    .辅色粒子 { background:var(--secondary-container); box-shadow:0 0 10px var(--secondary-container); }
    .p1 { top:15%; left:20%; animation:float 6s ease-in-out infinite; } .p2 { top:40%; left:10%; animation:float 8s ease-in-out infinite; animation-delay:1s; } .p3 { top:80%; left:30%; animation:float 7s ease-in-out infinite; animation-delay:2s; } .p4 { top:25%; right:15%; animation:float 9s ease-in-out infinite; animation-delay:.5s; }
    .p5 { top:60%; right:20%; animation:float 6s ease-in-out infinite; animation-delay:1.5s; } .p6 { top:10%; right:40%; animation:float 8s ease-in-out infinite; animation-delay:2.5s; } .p7 { right:10%; bottom:15%; animation:float 7s ease-in-out infinite; animation-delay:1.2s; } .p8 { right:45%; bottom:40%; animation:float 9s ease-in-out infinite; animation-delay:1.8s; }
    .p9 { top:5%; left:45%; animation:float 6s ease-in-out infinite; animation-delay:.3s; } .p10 { top:50%; left:50%; animation:float 8s ease-in-out infinite; animation-delay:2.2s; } .p11 { bottom:20%; left:5%; animation:float 7s ease-in-out infinite; animation-delay:.7s; } .p12 { top:70%; left:15%; animation:float 9s ease-in-out infinite; animation-delay:1.1s; }
    
    /* 赛博网格背景 */
    .网格背景 { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; height:100%; z-index:-1; pointer-events:none; opacity:.1; }
    .网格背景::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0; background-image:linear-gradient(rgba(245,211,110,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(245,211,110,.1) 1px, transparent 1px); background-size:20px 20px; }

    .八卦触发器 { position:relative; width:320px; height:320px; display:flex; align-items:center; justify-content:center; cursor:pointer; transform:translateY(70px); transition:transform .5s; }
    .八卦触发器:active { transform:translateY(70px) scale(.95); }
    @media (min-width:768px) { .八卦触发器 { width:384px; height:384px; } }

    .金色光晕 { position:absolute; inset:-20%; border-radius:9999px; opacity:.6; background:radial-gradient(circle at center,rgba(245,211,110,.15) 0%,transparent 70%); }
    .阴阳提示圈 { position:absolute; z-index:20; width:160px; height:160px; border:1px solid rgba(245,211,110,.3); border-radius:9999px; animation:hint-pulse 2s ease-in-out infinite; }
    .静态层 { position:absolute; inset:0; z-index:10; pointer-events:none; }
    .八边形边框 { position:absolute; inset:0; border:2px solid rgba(245,211,110,.8); clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%); }
    .顶点层 { position:absolute; inset:0; }
    .顶点光点 { position:absolute; width:8px; height:8px; border-radius:9999px; background:var(--secondary-container); box-shadow:0 0 10px #f5d36e; }

    .旋转层 { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; transform-origin:center; animation:rotate-slow 40s linear infinite; }
    .旋转层.spinning { animation:rotate-fast .6s linear infinite !important; }
    .旋转层.slowing { animation:rotate-slow-down 2s ease-out forwards !important; }
    .圆盘背景 { position:absolute; inset:1rem; background:var(--background); border:1px solid rgba(245,211,110,.1); border-radius:9999px; }
    .中环 { position:absolute; inset:2rem; border:1px dashed rgba(245,211,110,.2); border-radius:9999px; }
    .卦象符号 { color:var(--secondary-container); font-size:28px; line-height:1; }
    .阴阳图 { position:absolute; width:150px; height:150px; border-radius:9999px; overflow:hidden; display:flex; box-shadow:0 0 40px rgba(245,211,110,.2); }
    .阴阳图 svg { width:100%; height:100%; display:block; }

    .文案区 { margin-top:8rem; max-width:20rem; text-align:center; }
    .文案区 > * + * { margin-top:1rem; }
    .顶部标签 { display:flex; align-items:center; justify-content:center; gap:.5rem; }
    .标签线 { width:3rem; height:1px; }
    .标签线.左 { background:linear-gradient(to right,transparent,var(--secondary-container)); }
    .标签线.右 { background:linear-gradient(to left,transparent,var(--secondary-container)); }
    .标签文案 { color:var(--secondary-container); font-size:.75rem; font-weight:700; letter-spacing:.6em; font-family:var(--font-stack); }
    .主标题 { margin:0; color:#fff; font-size:1.5rem; font-weight:700; letter-spacing:-.02em; font-family:var(--font-stack); }
    .副标题 { margin:0; color:var(--outline); font-size:.875rem; letter-spacing:.2em; opacity:.8; font-family:var(--font-stack); }
    .占卜按钮 { margin-top:2rem; width:200px; height:48px; border-radius:24px; border:1.5px solid var(--secondary-container); background:transparent; color:var(--secondary-container); font-size:.875rem; letter-spacing:.2em; text-transform:uppercase; font-family:var(--font-stack); cursor:pointer; transition:all .3s; }
    .占卜按钮:hover { background:var(--secondary-container); color:var(--on-secondary-fixed); }
    .占卜按钮:active { transform:scale(.95); }
    .占卜按钮:disabled { cursor:not-allowed; opacity:.9; }

    .页脚 { margin-top:auto; padding:0 1.5rem 6rem; text-align:center; }
    .页脚文案 { margin:0; color:var(--surface-variant); font-size:10px; letter-spacing:.2em; text-transform:uppercase; font-family:var(--font-stack); }

    .闪白层 { position:fixed; inset:0; background:var(--secondary-container); z-index:100; opacity:0; transition:opacity 1s; }
    .pulse-glow { animation:pulse 3s ease-in-out infinite; transition:box-shadow .6s ease; }
    .particles-active .pulse-glow { animation-duration:.5s; box-shadow:0 0 20px #f5d36e !important; }

    @keyframes rotate-slow { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes rotate-fast { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes rotate-slow-down { from { transform:rotate(0deg); } to { transform:rotate(720deg); } }
    @keyframes pulse { 0%,100% { opacity:.3; transform:scale(1); } 50% { opacity:.8; transform:scale(1.2); } }
    @keyframes hint-pulse { 0%,100% { transform:scale(.95); opacity:.2; } 50% { transform:scale(1.05); opacity:.6; } }
    @keyframes float { 0%,100% { transform:translate(0, 0); } 25% { transform:translate(10px, -10px); } 50% { transform:translate(0, 20px); } 75% { transform:translate(-10px, -10px); } }
  </style>
</head>
<body>
  <!-- 网格背景 -->
  <div class="网格背景"></div>
  
  <!-- 环境粒子背景 -->
  <div id="particle-container" class="粒子容器">
    <div class="粒子 粒子小 主色粒子 p1 pulse-glow" style="box-shadow:0 0 8px #D4393C;"></div>
    <div class="粒子 粒子大 辅色粒子 p2 pulse-glow" style="animation-delay:1s; box-shadow:0 0 8px #F5D36E;"></div>
    <div class="粒子 粒子小 辅色粒子 p3 pulse-glow" style="animation-delay:2s; box-shadow:0 0 8px #F5D36E;"></div>
    <div class="粒子 粒子大 主色粒子 p4 pulse-glow" style="animation-delay:.5s; box-shadow:0 0 8px #D4393C;"></div>
    <div class="粒子 粒子小 辅色粒子 p5 pulse-glow" style="animation-delay:1.5s; box-shadow:0 0 8px #F5D36E;"></div>
    <div class="粒子 粒子大 主色粒子 p6 pulse-glow" style="animation-delay:2.5s; box-shadow:0 0 8px #D4393C;"></div>
    <div class="粒子 粒子小 主色粒子 p7 pulse-glow" style="animation-delay:1.2s; box-shadow:0 0 8px #D4393C;"></div>
    <div class="粒子 粒子小 辅色粒子 p8 pulse-glow" style="animation-delay:1.8s; box-shadow:0 0 8px #F5D36E;"></div>
    <div class="粒子 粒子大 主色粒子 p9 pulse-glow" style="animation-delay:.3s; box-shadow:0 0 8px #D4393C;"></div>
    <div class="粒子 粒子小 辅色粒子 p10 pulse-glow" style="animation-delay:2.2s; box-shadow:0 0 8px #F5D36E;"></div>
    <div class="粒子 粒子小 主色粒子 p11 pulse-glow" style="animation-delay:.7s; box-shadow:0 0 8px #D4393C;"></div>
    <div class="粒子 粒子大 辅色粒子 p12 pulse-glow" style="animation-delay:1.1s; box-shadow:0 0 8px #F5D36E;"></div>
  </div>

  <!-- 主体内容 -->
  <main class="页面主内容">
    <div id="bagua-trigger" class="八卦触发器">
      <div class="金色光晕"></div>
      <div class="阴阳提示圈"></div>
      <div class="静态层">
        <div class="八边形边框"></div>
        <div class="顶点层">
          <div class="顶点光点" style="top:0; left:30%; transform:translate(-50%,-50%);"></div>
          <div class="顶点光点" style="top:0; left:70%; transform:translate(-50%,-50%);"></div>
          <div class="顶点光点" style="bottom:0; left:30%; transform:translate(-50%,50%);"></div>
          <div class="顶点光点" style="bottom:0; left:70%; transform:translate(-50%,50%);"></div>
          <div class="顶点光点" style="top:30%; left:0; transform:translate(-50%,-50%);"></div>
          <div class="顶点光点" style="top:70%; left:0; transform:translate(-50%,-50%);"></div>
          <div class="顶点光点" style="top:30%; right:0; transform:translate(50%,-50%);"></div>
          <div class="顶点光点" style="top:70%; right:0; transform:translate(50%,-50%);"></div>
        </div>
      </div>

      <div id="rotating-disc" class="旋转层">
        <div class="圆盘背景"></div>
        <div class="中环"></div>
        <!-- 乾（☰）：上方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) translateY(-130px);"><span class="卦象符号">☰</span></div>
        <!-- 兑（☱）：右上方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(45deg) translateY(-130px);"><span class="卦象符号">☱</span></div>
        <!-- 离（☲）：右方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(90deg) translateY(-130px);"><span class="卦象符号">☲</span></div>
        <!-- 震（☳）：右下方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(135deg) translateY(-130px);"><span class="卦象符号">☳</span></div>
        <!-- 坤（☷）：下方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(180deg) translateY(-130px);"><span class="卦象符号">☷</span></div>
        <!-- 艮（☶）：左下方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(225deg) translateY(-130px);"><span class="卦象符号">☶</span></div>
        <!-- 坎（☵）：左方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(270deg) translateY(-130px);"><span class="卦象符号">☵</span></div>
        <!-- 巽（☴）：左上方 -->
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) rotate(315deg) translateY(-130px);"><span class="卦象符号">☴</span></div>
        <div class="阴阳图">
          <svg viewBox="0 0 100 100" aria-hidden="true">
            <path d="M 50 0 A 50 50 0 0 0 50 100 A 25 25 0 0 0 50 50 A 25 25 0 0 1 50 0" fill="#D4393C"></path>
            <path d="M 50 0 A 50 50 0 0 1 50 100 A 25 25 0 0 0 50 50 A 25 25 0 0 1 50 0" fill="#F5D36E"></path>
            <circle cx="50" cy="25" r="8" fill="#D4393C"></circle>
            <circle cx="50" cy="75" r="8" fill="#F5D36E"></circle>
          </svg>
        </div>
      </div>
    </div>

    <div class="文案区">
      <div class="顶部标签">
        <div class="标签线 左"></div>
        <span class="标签文案">赛博国风</span>
        <div class="标签线 右"></div>
      </div>
      <h2 class="主标题">AI 运势占卜</h2>
      <p class="副标题">触碰八卦盘 · 开启命运天机</p>
      <button id="divine-btn" class="占卜按钮">开始占卜</button>
    </div>
  </main>

  <!-- 页脚信息 -->
  <footer class="页脚">
    <p class="页脚文案">仅供娱乐 · 祝你开麦大吉</p>
  </footer>

  <script>
    const disc = document.getElementById("rotating-disc");
    const trigger = document.getElementById("bagua-trigger");
    const btn = document.getElementById("divine-btn");
    const particleContainer = document.getElementById("particle-container");
    let isSpinning = false;
    let extraParticles = [];

    // 创建额外的粒子
    function createExtraParticles() {
      extraParticles = [];
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        const size = Math.random() > 0.5 ? '粒子小' : '粒子大';
        const color = Math.random() > 0.5 ? '主色粒子' : '辅色粒子';
        
        particle.className = `粒子 ${size} ${color} pulse-glow`;
        
        // 随机位置
        const top = Math.random() * 100;
        const left = Math.random() * 100;
        
        // 随机颜色和大小
        const isGold = Math.random() > 0.5;
        const glowColor = isGold ? '#F5D36E' : '#D4393C';
        const boxShadow = `0 0 12px ${glowColor}`;
        
        particle.style.cssText = `
          top: ${top}%;
          left: ${left}%;
          box-shadow: ${boxShadow};
          animation-delay: ${Math.random() * 2}s;
        `;
        
        particleContainer.appendChild(particle);
        extraParticles.push(particle);
      }
    }

    // 移除额外的粒子
    function removeExtraParticles() {
      extraParticles.forEach(particle => {
        if (particle.parentNode) {
          particle.parentNode.removeChild(particle);
        }
      });
      extraParticles = [];
    }

    function startDivination() {
      if (isSpinning) return;
      isSpinning = true;

      // 快速旋转
      disc.classList.remove("旋转层");
      void disc.offsetWidth;
      disc.classList.add("旋转层", "spinning");

      // 创建额外粒子并增强闪烁频率
      createExtraParticles();
      particleContainer.classList.add("particles-active");
      
      // 按钮状态
      btn.innerText = "天机转动中...";
      btn.disabled = true;

      // 动画时序控制
      setTimeout(() => {
        // 2 秒后进入减速
        disc.classList.remove("spinning");
        disc.classList.add("slowing");

        setTimeout(() => {
          // 1 秒减速后恢复慢速旋转并准备跳转
          disc.classList.remove("slowing");
          disc.classList.add("旋转层");
          particleContainer.classList.remove("particles-active");
          removeExtraParticles();
          btn.innerText = "揭示天机";

          setTimeout(() => {
            const flash = document.createElement("div");
            flash.className = "闪白层";
            document.body.appendChild(flash);

            setTimeout(() => {
              flash.style.opacity = "0.5";
              setTimeout(() => {
                window.location.href = "输入页.html";
              }, 600);
            }, 100);
          }, 300);
        }, 1000);
      }, 2000);
    }

    // 悬停时增加粒子闪烁频率
    trigger.addEventListener('mouseenter', () => {
      particleContainer.classList.add('particles-active');
    });

    trigger.addEventListener('mouseleave', () => {
      if (!isSpinning) {
        particleContainer.classList.remove('particles-active');
      }
    });

    trigger.addEventListener("click", startDivination);
    btn.addEventListener("click", startDivination);
  </script>
</body>
</html>
